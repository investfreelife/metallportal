name: cron-embedding-backfill

# Hits /api/cron/embedding-backfill on production every 6 hours.
#
# Runs from GitHub Actions instead of Vercel Cron because the Vercel Hobby
# plan caps cron triggers at 2/project, and those 2 slots are already taken
# by `trigger-agents` and `audit-data-health` (see vercel.json).
#
# Auth via repository secret `CRON_SECRET` (same value Vercel uses — keep
# them in sync if rotated).

on:
  schedule:
    - cron: '0 */6 * * *'   # 00:00, 06:00, 12:00, 18:00 UTC
  workflow_dispatch:        # allows manual trigger from Actions UI

permissions:
  contents: read

env:
  PROD_URL: https://www.harlansteel.ru

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Hit embedding-backfill endpoint
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "::error::CRON_SECRET secret not configured in repo"
            exit 1
          fi

          response=$(curl -sS -w "\n%{http_code}" \
            -H "X-Cron-Secret: $CRON_SECRET" \
            "${PROD_URL}/api/cron/embedding-backfill")

          body=$(echo "$response" | head -n -1)
          status=$(echo "$response" | tail -n 1)

          echo "HTTP $status"
          echo "Body: $body"

          if [ "$status" != "200" ]; then
            echo "::error::Backfill returned non-200 status $status"
            exit 1
          fi

          # Surface processed/failed counters so we can see them in the run summary.
          echo "## Backfill result" >> "$GITHUB_STEP_SUMMARY"
          echo '```json' >> "$GITHUB_STEP_SUMMARY"
          echo "$body" | python3 -m json.tool >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || echo "$body" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
