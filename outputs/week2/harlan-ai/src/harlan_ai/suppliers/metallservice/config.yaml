# Конфигурация поставщика "Металлсервис".
# Парсер использует ЭТОТ файл (а не хардкод) для распознавания структуры.
# Обновляется когда менеджер отвечает на parsing_questions с answer_creates_rule=true.

slug: metallservice
domain: mc.ru

# Дефолтные единицы измерения, известные парсеру.
# При появлении новой — парсер задаст вопрос менеджеру.
known_units:
  - "т"
  - "теор.т"
  - "тыс.шт"
  - "м"
  - "м2"
  - "шт"
  - "кг"

# Дефолтное соответствие имени файла разделу прайса.
# Парсер использует если внутри файла не нашёл строку-заголовок раздела.
file_to_section:
  cvetmet:        "Цветной прокат"
  engineering:    "Инжиниринг"
  kachestvst:     "Качественные стали"
  krepezh:        "Крепеж"
  listovojprokat: "Листовой прокат"
  metizy:         "Метизы"
  nerzhaveika:    "Нержавеющая сталь"
  profnastil:     "Профнастил"
  sortovojprokat: "Сортовой прокат"
  truby:          "Трубы"

# Известные подкатегории. На неизвестную → парсер задаст вопрос.
# Список накапливается из ответов менеджера.
known_subcategories:
  - "АРМАТУРА"
  - "УГОЛОК"
  - "БАЛКА"
  - "ШВЕЛЛЕР"
  - "КВАДРАТ"
  - "КРУГ"
  - "ПОЛОСА"
  - "ШЕСТИГРАННИК"
  - "ТРУБА КРУГЛАЯ"
  - "ТРУБА ПРОФИЛЬНАЯ"
  - "ТРУБА ВОДОГАЗОПРОВОДНАЯ"
  - "ТРУБА Б/Ш"
  - "СТАЛЬ ЛИСТОВАЯ Г/К"
  - "СТАЛЬ ЛИСТОВАЯ Х/К"
  - "СТАЛЬ РИФЛЕНАЯ"
  - "АЛЮМИНИЕВЫЙ КРУГ"
  - "АЛЮМИНИЕВЫЙ ЛИСТ"
  - "ЛАТУНЬ"
  - "БРОНЗА"
  - "МЕДЬ"
  - "ПРОФНАСТИЛ"

# Шаблоны заголовков колонок.
# Парсер видит строку с этими словами → понимает что под ней — данные.
header_keywords:
  - "марка"
  - "диаметр"
  - "толщина"
  - "полка"
  - "стенка"
  - "наим"           # сокращение от "наименование"
  - "размер"
  - "ед.изм"
  - "цена"
  - "длина"

# Регулярные выражения для пропуска "мусорных" строк (контакты, реклама, пустые)
ignore_patterns:
  - '^\+7'           # начинается с телефона
  - '^https?://'     # ссылка
  - '^прайс-лист'    # дата прайса
  - '^от\s+\d'       # "от 24.04.2026"
